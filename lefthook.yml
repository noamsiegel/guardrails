---
# git-guardrails: portable git-hook quality harness
#
# Policy: user-owned safety baseline. Project language lint/type/test hooks
# belong in repo-owned hook config or CI.
# This file is portable: consumed locally from the git-guardrails template directory
# and can be composed from other hook managers.
#
# Paths in `run:` commands use ${GIT_GUARDRAILS_TEMPLATES:-$HOME/.config/git-guardrails/templates}
# so consumers can vendor this file into any directory by setting GIT_GUARDRAILS_TEMPLATES
# to that location.
#
# Universal checks registry: checks/registry.sh is canonical.
# Cross-check entries (command -> skip env):
#   - branch-guard -> SKIP_BRANCH_GUARD
#   - large-files -> SKIP_LARGE_FILES
#   - gitleaks -> SKIP_GITLEAKS
#   - actionlint -> SKIP_ACTIONLINT
#   - commitlint -> SKIP_COMMITLINT
#   - fallow -> SKIP_FALLOW
#
# Bypass:
#   - GIT_GUARDRAILS_SKIP=1 git commit          (skip everything)
#   - SKIP_<CHECK>=1 git commit                  (per-check skip)
#   - Repo path in $GIT_GUARDRAILS_TEMPLATES/.opt-out    (user-owned per-repo opt-out)
#   - git commit --no-verify                     (nuclear; skips repo hooks too)

assert_lefthook_installed: false  # invoked manually by entry shims, not git-installed
no_tty: true

pre-commit:
  parallel: true
  follow: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --no-banner --redact --verbose --config "${GIT_GUARDRAILS_TEMPLATES:-$HOME/.config/git-guardrails/templates}/gitleaks.toml"
      skip:
        - run: test -n "${SKIP_GITLEAKS:-}"
      stage_fixed: false
      fail_text: |
        gitleaks found potential secrets in staged changes.
        Review the report above. For per-commit exceptions, use
        `.gitleaksignore` in the repo root (fingerprint-based, safe).
        For cross-repo allowlists, edit $GIT_GUARDRAILS_TEMPLATES/gitleaks.toml.
        Bypass: SKIP_GITLEAKS=1.
    actionlint:
      glob:
        - ".github/workflows/*.yml"
        - ".github/workflows/*.yaml"
      run: actionlint -- {staged_files}
      skip:
        - run: test -n "${SKIP_ACTIONLINT:-}"
      fail_text: |
        actionlint flagged issues in your GitHub Actions workflow YAML.
        Fix the diagnostics above, or bypass with SKIP_ACTIONLINT=1.
    large-files:
      run: "${GIT_GUARDRAILS_TEMPLATES:-$HOME/.config/git-guardrails/templates}/checks/large-files.sh -- {staged_files}"
      skip:
        - run: test -n "${SKIP_LARGE_FILES:-}"
      fail_text: |
        One or more staged files (the staged blob, not the worktree file) exceed
        the size threshold (default 5MB).
        Override per-invocation: LARGE_FILE_LIMIT_MB=20 git commit ...
        Bypass: SKIP_LARGE_FILES=1.
commit-msg:
  commands:
    commitlint:
      run: commitlint --edit {1} --config "${GIT_GUARDRAILS_TEMPLATES:-$HOME/.config/git-guardrails/templates}/commitlint.config.cjs"
      skip:
        - run: test -n "${SKIP_COMMITLINT:-}"
      fail_text: |
        Commit message does not follow Conventional Commits.
        Examples:
          feat(auth): add SSO support
          fix: resolve race in worker pool
          chore(deps): bump biome to 2.4
        Bypass: SKIP_COMMITLINT=1 (or git commit --no-verify).

pre-push:
  parallel: true
  commands:
    # branch-guard runs outside lefthook (in the pre-push entry shim) so it
    # can see the raw refs stdin; lefthook consumes that stdin for its own
    # template variables before commands see it.
    fallow:
      glob:
        - "*.ts"
        - "*.tsx"
        - "*.js"
        - "*.jsx"
        - "*.mjs"
        - "*.cjs"
      run: "${GIT_GUARDRAILS_TEMPLATES:-$HOME/.config/git-guardrails/templates}/checks/fallow.sh"
      only:
        - run: test -f package.json
      skip:
        - run: test -n "${SKIP_FALLOW:-}"
      fail_text: |
        fallow audit flagged issues in changed JS/TS files.
        Review findings above, fix or suppress them, then re-push.
        Bypass: SKIP_FALLOW=1 (or git push --no-verify).
