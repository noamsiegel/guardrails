# guardrails personal gitleaks baseline.
#
# THIS FILE OVERRIDES REPO-LOCAL .gitleaks.toml when guardrails runs gitleaks,
# because lefthook invokes gitleaks with `--config <this file>` explicitly.
#
# Why: a hostile or careless repo cannot use its own .gitleaks.toml to add
# broad allowlists that disable detection. Repo authors can still use
# `.gitleaksignore` for fingerprint-level exceptions (per-commit, requires the
# specific secret value to match) — that path remains repo-owned and safe.
#
# To add personal allowlists (e.g. test fixtures across all your repos),
# extend this file. Do NOT add repo-specific patterns here — those belong in
# `.gitleaksignore` inside the repo.

title = "guardrails personal baseline"

[extend]
# Use the default gitleaks ruleset (200+ rules for AWS, GCP, Stripe, JWT, …).
useDefault = true

# ── Personal allowlist ─────────────────────────────────────────────────────
# To add cross-repo allowlist patterns (e.g. test fixtures with deliberately
# fake keys), uncomment and customize the block below.
# Repo-specific exceptions belong in <repo>/.gitleaksignore, not here.
#
# [[allowlists]]
#   description = "Test fixtures with deliberately fake keys"
#   paths = ['''tests/fixtures/''']
