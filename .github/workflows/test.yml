name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install hook tools
        # Runtime dependencies the binary expects + tools the bun:test
        # fixtures shell out to. commitlint is installed into this checkout so
        # commitlint.config.cjs can resolve @commitlint/config-conventional.
        run: |
          brew install lefthook gitleaks actionlint
          bun add --dev @commitlint/cli @commitlint/config-conventional
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Verify hook tools are reachable
        run: |
          lefthook version
          gitleaks version
          actionlint -version
          commitlint --version

      - name: Lint shell scripts
        run: |
          bash -n ai-git-guardrails
          bash -n checks/registry.sh
          for f in checks/*.sh; do bash -n "$f"; done

      - name: Run test suite
        # Tests use bun:test; no package.json required.
        run: bun test tests/ai-git-guardrails.test.ts

      - name: Smoke check
        run: ./ai-git-guardrails --version
