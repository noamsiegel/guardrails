name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install hook tools
        run: brew install lefthook gitleaks actionlint

      - name: Install dependencies
        run: bun install

      - name: Lint shell scripts
        run: |
          bash -n pre-commit
          bash -n pre-push
          bash -n commit-msg
          bash -n checks/large-files.sh
          bash -n checks/branch-guard.sh
          bash -n checks/fallow.sh

      - name: Run bun-test suite
        run: bun test tests/guardrails.test.ts
