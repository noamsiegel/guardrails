name: release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump'
        type: choice
        options: [patch, minor, major]
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: tag
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          IFS=. read -r major minor patch <<< "${latest#v}"
          case "${{ inputs.version_bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new_tag="v${major}.${minor}.${patch}"
          echo "tag_name=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG entry
        run: |
          if ! grep -q "## \[${{ steps.tag.outputs.tag_name }}\]" CHANGELOG.md && \
             ! grep -q "## ${{ steps.tag.outputs.tag_name }}" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain an entry for ${{ steps.tag.outputs.tag_name }}."
            exit 1
          fi

      - name: Tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "noam@noamsiegel.com"
          git config user.name "Noam Siegel"
          git tag -a "${{ steps.tag.outputs.tag_name }}" -m "${{ steps.tag.outputs.tag_name }}"
          git push origin "${{ steps.tag.outputs.tag_name }}"
          gh release create "${{ steps.tag.outputs.tag_name }}" \
            --title "${{ steps.tag.outputs.tag_name }}" \
            --notes-from-tag \
            --verify-tag

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: guardrails
          formula-path: Formula/guardrails.rb
          homebrew-tap: noamsiegel/homebrew-tap
          tag-name: ${{ needs.release.outputs.tag_name }}
          download-url: https://github.com/noamsiegel/guardrails/archive/refs/tags/${{ needs.release.outputs.tag_name }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
